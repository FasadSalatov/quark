name: Conformance suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Go unit + conformance tests
        working-directory: clients/go
        run: |
          go test ./...
          go test -tags conformance ./conformance/...

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v3
        with:
          version: '10'
      - name: TS unit tests
        working-directory: clients/typescript
        run: |
          pnpm install
          pnpm test
      - name: TS conformance
        working-directory: tests/conformance
        run: |
          pnpm install
          pnpm test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Python unit + conformance
        working-directory: clients/python
        run: |
          pip install -e . pytest pytest-asyncio
          pytest tests/ -v
          python ../../tests/conformance/conformance_py.py
